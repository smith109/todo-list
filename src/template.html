<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
  </head>

  <body>
    <div class="sidebar">
      <h2>Projects</h2>
      <button class="add-project-btn">Add Project</button>
      <ul class="projects"></ul>
    </div>
    <div class="main">
      <div class="header">
        <h2 class="project-name"></h2>
        <button class="add-todo-btn">Add Todo</button>
      </div>
      <div class="todos"></div>
    </div>
    <dialog class="project-modal">
      <form method="dialog" class="project-form">
        <h2>Add Project</h2>
        <div class="form-row">
          <label for="project-name">Name:</label>
          <input type="text" name="project-name" id="project-name" autofocus required>
        </div>
        <div class="form-row">
          <button type="button" class="cancel-btn">Cancel</button>
          <button type="submit">Confirm</button>
        </div>
      </form>
    </dialog>
    <dialog class="todo-modal">
      <h2>Add Todo</h2>
      <form method="dialog" class="todo-form">
        <div class="form-row">
          <label for="todo-title">Title:</label>
          <input type="text" name="todo-title" id="todo-title" autofocus required>
        </div>
        <div class="form-row">
          <label for="todo-description">Description:</label>
          <textarea name="todo-description" id="todo-description" rows="4" cols="25"></textarea>
        </div>
        <div class="form-row">
          <label for="todo-due-date">Due Date:</label>
          <input type="date" name="todo-due-date" id="todo-due-date" required>
        </div>
        <fieldset>
          <legend>Priority</legend>
          <div>
            <input type="radio" name="todo-priority" id="low" value="low" checked>
            <label for="low">Low</label>
          </div>
          <div>
            <input type="radio" name="todo-priority" id="medium" value="medium">
            <label for="medium">Medium</label>
          </div>
          <div>
            <input type="radio" name="todo-priority" id="high" value="high">
            <label for="high">High</label>
          </div>
        </fieldset>
        <div class="form-row">
          <button type="button" class="cancel-btn">Cancel</button>
          <button type="submit">Confirm</button>
        </div>
      </form>
    </dialog>
  </body>

</html>
